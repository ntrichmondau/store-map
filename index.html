<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Retail Network Map (Stable)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; width:100%; }

#panel{
  position:absolute;
  top:10px; left:10px;
  background:white;
  padding:10px;
  z-index:999;
  border-radius:8px;
  width:220px;
}
</style>
</head>

<body>

<div id="panel">
<h3>Store Map</h3>
<div id="stats"></div>
</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([-25.5,133],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'&copy; OpenStreetMap'
}).addTo(map);

// clusters
const jb = L.markerClusterGroup();
const gg = L.markerClusterGroup();
map.addLayer(jb);
map.addLayer(gg);

// REAL coordinates (no geocoding needed)
const stores = [
["JB Hi-Fi Carseldine",-27.3502,153.0156],
["Good Guys Townsville",-19.3032,146.7520],
["Good Guys Browns Plains",-27.6603,153.0400],
["Good Guys Bundaberg",-24.8841,152.3500],
["Good Guys Mackay",-21.1360,149.1860],
["Good Guys Cairns",-16.9490,145.7700],
["Good Guys Capalaba",-27.5220,153.1910],
["JB Garbutt",-19.2830,146.7780],
["Good Guys Garbutt",-19.2830,146.7780],
["Good Guys Helensvale",-27.9180,153.3310],
["Good Guys Hervey Bay",-25.2860,152.8380],
["Good Guys Booval",-27.6150,152.7890],
["Good Guys Loganholme",-27.6760,153.1850],
["JB Lutwyche",-27.4220,153.0320],
["JB Macgregor",-27.5590,153.0630],
["Good Guys North Lakes",-27.2240,153.0200],
["Good Guys Maroochydore",-26.6570,153.0890],
["JB Morayfield",-27.1080,152.9490],
["Good Guys Rockhampton",-23.3570,150.5190],
["JB North Lakes",-27.2240,153.0200],
["Good Guys Oxley",-27.5600,152.9700],
["JB Birtinya",-26.7450,153.1190],
["JB Robina",-28.0700,153.3930],
["Good Guys Tingalpa",-27.4730,153.1340],
["Good Guys Toowoomba",-27.5600,151.9530],
["Good Guys Townsville 2",-19.3150,146.7680],
["Good Guys Kawana",-26.7180,153.1230]
];

let bounds=[];

let jbCount=0, ggCount=0;

stores.forEach(s=>{
  const name=s[0], lat=s[1], lng=s[2];

  const isJB=name.includes("JB");

  const marker=L.marker([lat,lng]).bindPopup(`
    <b>${name}</b><br>
    <a target="_blank"
    href="https://www.google.com/maps?q=${lat},${lng}">
    Open in Google Maps</a>
  `);

  if(isJB){ jb.addLayer(marker); jbCount++; }
  else { gg.addLayer(marker); ggCount++; }

  bounds.push([lat,lng]);
});

map.fitBounds(bounds);

// stats
document.getElementById("stats").innerHTML = `
JB Hi-Fi: ${jbCount}<br>
Good Guys: ${ggCount}<br>
Total: ${stores.length}
`;

</script>

</body>
</html>
